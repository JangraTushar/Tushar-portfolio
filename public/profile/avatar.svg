<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#312e81" /> <!-- Indigo 900 -->
      <stop offset="70%" stop-color="#111827" /> <!-- Gray 900 -->
      <stop offset="100%" stop-color="#030712" /> <!-- Gray 950 -->
    </radialGradient>

    <!-- Aura Glow Feature -->
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </radialGradient>

    <!-- Face Skin Gradient -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />  <!-- Peach orange -->
      <stop offset="100%" stop-color="#fed7aa" />
    </linearGradient>

    <!-- Indigo Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Purple/Cyber Neon Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Hair Shadow/Highlights -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Drop Shadow for details -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Sphere with radial space theme -->
  <rect width="240" height="240" rx="120" fill="url(#bgGrad)" />

  <!-- Ambient glowing circles -->
  <circle cx="120" cy="120" r="90" fill="url(#auraGlow)" />
  <circle cx="120" cy="95" r="50" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,6" />
  <circle cx="120" cy="95" r="70" fill="none" stroke="url(#neonGrad)" stroke-width="1" stroke-opacity="0.2" />

  <!-- Code elements/nodes floating in background -->
  <g opacity="0.4" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">
    <!-- Binary Code on Left -->
    <text x="35" y="80" fill="#818cf8" opacity="0.6">&lt;AI&gt;</text>
    <text x="30" y="105" fill="#a855f7" opacity="0.4">f(x)</text>
    <text x="25" y="130" fill="#818cf8" opacity="0.5">0110</text>
    
    <!-- Code Bracket on Right -->
    <text x="180" y="80" fill="#a855f7" opacity="0.6">{}</text>
    <text x="185" y="105" fill="#e0f2fe" opacity="0.4">[]</text>
    <text x="175" y="130" fill="#818cf8" opacity="0.5">&lt;/&gt;</text>
  </g>

  <!-- Developer Figure group -->
  <g filter="url(#shadow)">
    <!-- Shoulders/Clothes (Minimal high-collared jacket) -->
    <path d="M 55,225 C 55,185 85,170 120,170 C 155,170 185,185 185,225 Z" fill="#1e293b" />
    <!-- Inner Hoodie V -->
    <path d="M 98,170 L 120,202 L 142,170 Z" fill="#334155" />
    <!-- Accent lapels -->
    <path d="M 98,170 Q 110,185 120,202" fill="none" stroke="url(#accentGrad)" stroke-width="2" />
    <path d="M 142,170 Q 130,185 120,202" fill="none" stroke="url(#accentGrad)" stroke-width="2" />

    <!-- Neck -->
    <path d="M 103,130 C 103,165 137,165 137,130 Z" fill="url(#skinGrad)" />
    <!-- Neck shadow -->
    <path d="M 103,138 C 114,148 126,148 137,138 C 137,155 103,155 103,138 Z" fill="#fdba74" opacity="0.6" />

    <!-- Face Shape -->
    <path d="M 85,92 C 85,138 100,154 120,154 C 140,154 155,138 155,92 C 155,54 140,54 120,54 C 100,54 85,54 85,92 Z" fill="url(#skinGrad)" />

    <!-- Hair & Beard (Sleek dark, modern style) -->
    <!-- Hair Volume -->
    <path d="M 83,85 C 80,72 82,53 96,44 C 108,36 132,36 144,44 C 158,53 160,72 157,85 C 154,72 152,58 140,53 C 128,48 112,48 100,53 C 88,58 86,72 83,85 Z" fill="url(#hairGrad)" />
    <!-- Hair Spikes/Bangs -->
    <path d="M 92,54 Q 107,52 118,58 Q 128,52 148,54 C 135,46 105,46 92,54 Z" fill="#0f172a" />
    <!-- Sleek Beard (Clean modern stubble/trim outline) -->
    <path d="M 85,95 C 85,138 100,152 120,152 C 140,152 155,138 155,95 C 155,110 148,153 120,153 C 92,153 85,110 85,95 Z" fill="#1f2937" opacity="0.35" />

    <!-- Eyes (Minimalist intelligent expression with high-tech glasses) -->
    <!-- Left Eye -->
    <ellipse cx="106" cy="94" rx="4" ry="2.5" fill="#0f172a" />
    <circle cx="107.5" cy="93" r="1" fill="#fff" />
    <!-- Right Eye -->
    <ellipse cx="134" cy="94" rx="4" ry="2.5" fill="#0f172a" />
    <circle cx="135.5" cy="93" r="1" fill="#fff" />

    <!-- Eyebrows -->
    <path d="M 99,87 C 104,85 110,86 113,89" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" />
    <path d="M 141,87 C 136,85 130,86 127,89" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" />

    <!-- Nose -->
    <path d="M 117,100 L 120,111 L 123,100" fill="none" stroke="#fdba74" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Gentle Mouth/Smile -->
    <path d="M 111,126 Q 120,131 129,126" fill="none" stroke="#e05a47" stroke-width="2.2" stroke-linecap="round" />

    <!-- Cyber Glasses/Bezel (Sleek developer style) -->
    <!-- Left Rim -->
    <rect x="94" y="86" width="24" height="18" rx="6" fill="none" stroke="url(#accentGrad)" stroke-width="2" />
    <!-- Right Rim -->
    <rect x="122" y="86" width="24" height="18" rx="6" fill="none" stroke="url(#accentGrad)" stroke-width="2" />
    <!-- Center Bridge -->
    <line x1="118" y1="92" x2="122" y2="92" stroke="url(#accentGrad)" stroke-width="2.5" />
    <!-- Temple bars -->
    <path d="M 94,92 L 85,90" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" />
    <path d="M 146,92 L 155,90" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round" />
  </g>
  
  <!-- Subtle decorative node connects linking from eyes/mouth to borders to symbolise AI/ML integrations -->
  <g opacity="0.3" stroke="#818cf8" stroke-width="1" stroke-linecap="round">
    <line x1="120" y1="54" x2="120" y2="35" />
    <circle cx="120" cy="35" r="3" fill="#818cf8" />
  </g>
</svg>
